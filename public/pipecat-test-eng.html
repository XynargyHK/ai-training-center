<!DOCTYPE html>
<html>
<head>
  <title>Pipecat Voice AI - Full Duplex</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 30px auto; background: #111; color: #eee; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 10px; }
    #start { background: #2563eb; color: white; }
    #start:hover { background: #1d4ed8; }
    #start:disabled { background: #555; }
    #status { margin: 15px 0; font-size: 14px; color: #888; }
    #log { background: #222; padding: 12px; border-radius: 10px; font-family: monospace; font-size: 11px; max-height: 150px; overflow-y: auto; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Pipecat Voice AI</h1>
  <p>Full-duplex | Gemini Flash + Google Search</p>

  <div style="display:flex;gap:12px;margin-bottom:15px;flex-wrap:wrap;">
    <div>
      <label style="font-size:12px;color:#888;">TTS Provider</label><br>
      <select id="tts-provider" onchange="updateVoices()" style="padding:8px;background:#222;color:#eee;border:1px solid #444;border-radius:8px;font-size:14px;">
        <option value="azure">Azure</option>
        <option value="elevenlabs">ElevenLabs</option>
        <option value="cartesia">Cartesia</option>
        <option value="openai">OpenAI</option>
      </select>
    </div>
    <div>
      <label style="font-size:12px;color:#888;">Voice</label><br>
      <select id="tts-voice" style="padding:8px;background:#222;color:#eee;border:1px solid #444;border-radius:8px;font-size:14px;min-width:200px;"></select>
    </div>
  </div>

  <button id="start" onclick="startCall()">Start Voice Call</button>
  <div id="status">Click to start</div>


  <!-- Browser frame -->
  <div style="margin-top:20px;">
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <input id="url-bar" type="text" placeholder="Type a URL and press Enter..." value="https://www.google.com" style="flex:1;padding:8px 12px;background:#222;border:1px solid #444;border-radius:8px;color:#eee;font-size:13px;" onkeydown="if(event.key==='Enter'){document.getElementById('browser').src=this.value}">
      <button onclick="document.getElementById('browser').src=document.getElementById('url-bar').value" style="padding:8px 16px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;">Go</button>
    </div>
    <iframe id="browser" src="https://www.google.com" style="width:100%;height:500px;border:1px solid #333;border-radius:10px;background:white;"></iframe>
  </div>

  <details style="margin-top:15px;">
    <summary style="cursor:pointer;color:#555;font-size:12px;">Debug Log</summary>
    <div id="log"></div>
  </details>

  <script src="https://unpkg.com/@daily-co/daily-js"></script>
  <script>
    const PIPECAT_URL = 'https://pretty-alignment-production-891e.up.railway.app';
    let callObject = null;

    const VOICES = {
      azure: [
        { value: 'en-US-JennyNeural', label: 'Jenny (Female, US)' },
        { value: 'en-US-GuyNeural', label: 'Guy (Male, US)' },
        { value: 'en-US-AriaNeural', label: 'Aria (Female, US)' },
        { value: 'en-US-DavisNeural', label: 'Davis (Male, US)' },
        { value: 'en-GB-SoniaNeural', label: 'Sonia (Female, UK)' },
        { value: 'en-GB-RyanNeural', label: 'Ryan (Male, UK)' },
      ],
      elevenlabs: [
        { value: 'EXAVITQu4vr4xnSDxMaL', label: 'Sarah (Female)' },
        { value: '21m00Tcm4TlvDq8ikWAM', label: 'Rachel (Female)' },
        { value: 'ErXwobaYiN019PkySvjV', label: 'Antoni (Male)' },
        { value: 'VR6AewLTigWG4xSOukaG', label: 'Arnold (Male)' },
        { value: 'pNInz6obpgDQGcFmaJgB', label: 'Adam (Male)' },
      ],
      cartesia: [
        { value: 'a0e99841-438c-4a64-b679-ae501e7d6091', label: 'Barbershop Man' },
        { value: '79a125e8-cd45-4c13-8a67-188112f4dd22', label: 'British Lady' },
        { value: '694f9389-aac1-45b6-b726-9d9369183238', label: 'Confident Man' },
      ],
      openai: [
        { value: 'alloy', label: 'Alloy (Neutral)' },
        { value: 'echo', label: 'Echo (Male)' },
        { value: 'fable', label: 'Fable (Male, UK)' },
        { value: 'onyx', label: 'Onyx (Male, Deep)' },
        { value: 'nova', label: 'Nova (Female)' },
        { value: 'shimmer', label: 'Shimmer (Female)' },
      ],
    };

    function updateVoices() {
      const provider = document.getElementById('tts-provider').value;
      const select = document.getElementById('tts-voice');
      select.innerHTML = '';
      VOICES[provider].forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.value;
        opt.textContent = v.label;
        select.appendChild(opt);
      });
    }
    updateVoices();

    function log(msg) {
      const el = document.getElementById('log');
      el.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
      el.scrollTop = el.scrollHeight;
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    async function startCall() {
      const btn = document.getElementById('start');
      btn.disabled = true;
      setStatus('Creating room...');
      log('Calling POST /start...');

      try {
        const ttsProvider = document.getElementById('tts-provider').value;
        const ttsVoice = document.getElementById('tts-voice').value;
        const res = await fetch(PIPECAT_URL + '/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lang: 'en', tts_provider: ttsProvider, tts_voice: ttsVoice }) });
        const data = await res.json();

        if (data.error) {
          log('Error: ' + data.error);
          setStatus('Error: ' + data.error);
          btn.disabled = false;
          return;
        }

        log('Room created: ' + data.room_url);
        log('Bot PID: ' + data.bot_pid);
        setStatus('Joining room...');

        // Join the Daily room
        callObject = DailyIframe.createCallObject({
          audioSource: true,
          videoSource: false,
          subscribeToTracksAutomatically: true,
          dailyConfig: {
            experimentalChromeVideoMuteLightOff: true,
          },
        });

        // Ensure we can hear remote audio
        callObject.on('track-started', (event) => {
          if (event.track.kind === 'audio' && !event.participant.local) {
            log('Receiving AI audio track');
            const audio = new Audio();
            audio.srcObject = new MediaStream([event.track]);
            audio.autoplay = true;
            audio.play().catch(e => log('Audio play error: ' + e.message));
          }
        });

        // Listen for URL messages from the bot
        callObject.on('app-message', (event) => {
          const data = event.data;
          if (!data || !data.type) return;
          if (data.type === 'open-url' && data.url) {
            const frame = document.getElementById('display-frame');
            frame.innerHTML = '<div style="text-align:left;width:100%"><div style="color:#7c7cff;font-size:12px;margin-bottom:10px;">Opening: ' + data.url + '</div><a href="' + data.url + '" target="_blank" style="color:#2563eb;font-size:16px;">Click to open in new tab</a></div>';
            window.open(data.url, '_blank');
          }
        });

        callObject.on('joined-meeting', () => {
          log('Joined meeting!');
          setStatus('Connected - speak now! (full-duplex)');
          btn.textContent = 'End Call';
          btn.disabled = false;
          btn.style.background = '#dc2626';
          btn.onclick = endCall;
        });

        callObject.on('participant-joined', (e) => {
          if (!e.participant.local) {
            log('AI bot joined the room');
          }
        });

        callObject.on('participant-left', (e) => {
          if (!e.participant.local) {
            log('AI bot left the room');
          }
        });

        callObject.on('error', (e) => {
          log('Error: ' + JSON.stringify(e));
        });

        callObject.on('left-meeting', () => {
          log('Left meeting');
          setStatus('Call ended');
          btn.textContent = 'Start Voice Call';
          btn.disabled = false;
          btn.style.background = '#2563eb';
          btn.onclick = startCall;
        });

        await callObject.join({ url: data.room_url });

      } catch (err) {
        log('Error: ' + err.message);
        setStatus('Error: ' + err.message);
        btn.disabled = false;
      }
    }

    async function endCall() {
      if (callObject) {
        await callObject.leave();
        callObject.destroy();
        callObject = null;
      }
    }
  </script>
</body>
</html>
