<!DOCTYPE html>
<html>
<head>
  <title>Pipecat Voice AI - Full Duplex</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 30px auto; background: #111; color: #eee; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 10px; }
    #start { background: #2563eb; color: white; }
    #start:hover { background: #1d4ed8; }
    #start:disabled { background: #555; }
    #status { margin: 15px 0; font-size: 14px; color: #888; }
    #log { background: #222; padding: 12px; border-radius: 10px; font-family: monospace; font-size: 11px; max-height: 150px; overflow-y: auto; white-space: pre-wrap; }
    /* Conversation panel */
    #conversation { margin-top: 20px; }
    #conversation h3 { margin: 0 0 10px; font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    #messages { background: #1a1a2e; border-radius: 12px; padding: 15px; min-height: 200px; max-height: 400px; overflow-y: auto; }
    .msg { margin: 8px 0; padding: 10px 14px; border-radius: 10px; max-width: 85%; line-height: 1.5; font-size: 15px; animation: fadeIn 0.3s; }
    .msg.user { background: #2563eb; margin-left: auto; text-align: right; color: white; }
    .msg.ai { background: #2d2d44; color: #e0e0e0; }
    .msg .label { font-size: 10px; text-transform: uppercase; color: #888; margin-bottom: 3px; }
    .msg.ai .label { color: #7c7cff; }
    .msg.user .label { color: #93c5fd; }
    /* Live subtitle */
    #live-subtitle { margin-top: 15px; padding: 12px 16px; background: #0d0d1a; border: 1px solid #333; border-radius: 10px; min-height: 40px; font-size: 16px; color: #aaa; font-style: italic; }
    #live-subtitle.active { color: #fff; border-color: #7c7cff; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <h1>Pipecat Voice AI</h1>
  <p>Full-duplex | Gemini Flash + Google Search + Cartesia TTS</p>
  <button id="start" onclick="startCall()">Start Voice Call</button>
  <div id="status">Click to start</div>

  <!-- Conversation panel with subtitles -->
  <div id="conversation">
    <h3>Conversation</h3>
    <div id="messages"></div>
    <div id="live-subtitle">Waiting for conversation...</div>
  </div>

  <!-- Debug log (collapsed) -->
  <details style="margin-top:15px;">
    <summary style="cursor:pointer;color:#555;font-size:12px;">Debug Log</summary>
    <div id="log"></div>
  </details>

  <script src="https://unpkg.com/@daily-co/daily-js"></script>
  <script>
    const PIPECAT_URL = 'https://pretty-alignment-production-891e.up.railway.app';
    let callObject = null;

    function log(msg) {
      const el = document.getElementById('log');
      el.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
      el.scrollTop = el.scrollHeight;
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    async function startCall() {
      const btn = document.getElementById('start');
      btn.disabled = true;
      setStatus('Creating room...');
      log('Calling POST /start...');

      try {
        const res = await fetch(PIPECAT_URL + '/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lang: 'en' }) });
        const data = await res.json();

        if (data.error) {
          log('Error: ' + data.error);
          setStatus('Error: ' + data.error);
          btn.disabled = false;
          return;
        }

        log('Room created: ' + data.room_url);
        log('Bot PID: ' + data.bot_pid);
        setStatus('Joining room...');

        // Join the Daily room
        callObject = DailyIframe.createCallObject({
          audioSource: true,
          videoSource: false,
          subscribeToTracksAutomatically: true,
          dailyConfig: {
            experimentalChromeVideoMuteLightOff: true,
          },
        });

        // Ensure we can hear remote audio
        callObject.on('track-started', (event) => {
          if (event.track.kind === 'audio' && !event.participant.local) {
            log('Receiving AI audio track');
            const audio = new Audio();
            audio.srcObject = new MediaStream([event.track]);
            audio.autoplay = true;
            audio.play().catch(e => log('Audio play error: ' + e.message));
          }
        });

        // Listen for subtitle/transcript messages from the bot
        let lastAiText = '';
        let commitTimer = null;

        function commitAiMessage() {
          if (lastAiText.trim()) {
            const messagesEl = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg ai';
            div.innerHTML = '<div class="label">AI</div>' + lastAiText;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
          lastAiText = '';
          document.getElementById('live-subtitle').className = '';
          document.getElementById('live-subtitle').textContent = '';
        }

        callObject.on('app-message', (event) => {
          const data = event.data;
          if (!data || !data.type) return;

          const subtitleEl = document.getElementById('live-subtitle');
          const messagesEl = document.getElementById('messages');

          if (data.type === 'transcript') {
            // Commit previous AI message if any
            if (commitTimer) clearTimeout(commitTimer);
            commitAiMessage();
            // Show user message
            const div = document.createElement('div');
            div.className = 'msg user';
            div.innerHTML = '<div class="label">You</div>' + data.text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
          } else if (data.type === 'subtitle') {
            // AI is speaking (streaming)
            subtitleEl.className = 'active';
            subtitleEl.textContent = data.text;
            lastAiText = data.text;
            // Auto-commit after 2s of no new text
            if (commitTimer) clearTimeout(commitTimer);
            commitTimer = setTimeout(commitAiMessage, 2000);
          }
        });

        callObject.on('joined-meeting', () => {
          log('Joined meeting!');
          setStatus('Connected - speak now! (full-duplex)');
          btn.textContent = 'End Call';
          btn.disabled = false;
          btn.style.background = '#dc2626';
          btn.onclick = endCall;
        });

        callObject.on('participant-joined', (e) => {
          if (!e.participant.local) {
            log('AI bot joined the room');
          }
        });

        callObject.on('participant-left', (e) => {
          if (!e.participant.local) {
            log('AI bot left the room');
          }
        });

        callObject.on('error', (e) => {
          log('Error: ' + JSON.stringify(e));
        });

        callObject.on('left-meeting', () => {
          log('Left meeting');
          setStatus('Call ended');
          btn.textContent = 'Start Voice Call';
          btn.disabled = false;
          btn.style.background = '#2563eb';
          btn.onclick = startCall;
        });

        await callObject.join({ url: data.room_url });

      } catch (err) {
        log('Error: ' + err.message);
        setStatus('Error: ' + err.message);
        btn.disabled = false;
      }
    }

    async function endCall() {
      if (callObject) {
        await callObject.leave();
        callObject.destroy();
        callObject = null;
      }
    }
  </script>
</body>
</html>
