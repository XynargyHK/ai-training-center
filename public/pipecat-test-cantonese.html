<!DOCTYPE html>
<html>
<head>
  <title>Pipecat Voice AI - Cantonese</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 50px auto; background: #111; color: #eee; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 10px; }
    #start { background: #2563eb; color: white; }
    #start:hover { background: #1d4ed8; }
    #start:disabled { background: #555; }
    #status { margin: 20px 0; font-size: 14px; color: #888; }
    #log { background: #222; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Pipecat Voice AI — Cantonese</h1>
  <p>Azure STT + Gemini Flash + Azure TTS (zh-HK)</p>
  <label for="voice" style="font-size:14px;color:#aaa;">Voice:</label>
  <select id="voice" style="padding:8px 12px;font-size:14px;border-radius:8px;background:#222;color:#eee;border:1px solid #444;margin-bottom:15px;">
    <option value="zh-HK-WanLungNeural">WanLung (Male)</option>
    <option value="zh-HK-HiuMaanNeural">HiuMaan (Female)</option>
    <option value="zh-HK-HiuGaaiNeural">HiuGaai (Female)</option>
  </select>
  <br>
  <button id="start" onclick="startCall()">Start Voice Call</button>
  <div id="status">Click to start</div>
  <div id="log"></div>

  <script src="https://unpkg.com/@daily-co/daily-js"></script>
  <script>
    const PIPECAT_URL = 'https://pretty-alignment-production-891e.up.railway.app';
    let callObject = null;

    function log(msg) {
      const el = document.getElementById('log');
      el.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
      el.scrollTop = el.scrollHeight;
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    async function startCall() {
      const btn = document.getElementById('start');
      btn.disabled = true;
      setStatus('Creating room...');
      log('Calling POST /start...');

      try {
        const voice = document.getElementById('voice').value;
        const res = await fetch(PIPECAT_URL + '/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lang: 'yue', voice: voice }) });
        const data = await res.json();

        if (data.error) {
          log('Error: ' + data.error);
          setStatus('Error: ' + data.error);
          btn.disabled = false;
          return;
        }

        log('Room created: ' + data.room_url);
        log('Bot PID: ' + data.bot_pid);
        setStatus('Joining room...');

        // Join the Daily room
        callObject = DailyIframe.createCallObject({
          audioSource: true,
          videoSource: false,
          subscribeToTracksAutomatically: true,
          dailyConfig: {
            experimentalChromeVideoMuteLightOff: true,
          },
        });

        // Ensure we can hear remote audio
        callObject.on('track-started', (event) => {
          if (event.track.kind === 'audio' && !event.participant.local) {
            log('Receiving AI audio track');
            const audio = new Audio();
            audio.srcObject = new MediaStream([event.track]);
            audio.autoplay = true;
            audio.play().catch(e => log('Audio play error: ' + e.message));
          }
        });

        callObject.on('joined-meeting', () => {
          log('Joined meeting!');
          setStatus('Connected - speak now! (full-duplex)');
          btn.textContent = 'End Call';
          btn.disabled = false;
          btn.style.background = '#dc2626';
          btn.onclick = endCall;
        });

        callObject.on('participant-joined', (e) => {
          if (!e.participant.local) {
            log('AI bot joined the room');
          }
        });

        callObject.on('participant-left', (e) => {
          if (!e.participant.local) {
            log('AI bot left the room');
          }
        });

        callObject.on('error', (e) => {
          log('Error: ' + JSON.stringify(e));
        });

        callObject.on('left-meeting', () => {
          log('Left meeting');
          setStatus('Call ended');
          btn.textContent = 'Start Voice Call';
          btn.disabled = false;
          btn.style.background = '#2563eb';
          btn.onclick = startCall;
        });

        await callObject.join({ url: data.room_url });

      } catch (err) {
        log('Error: ' + err.message);
        setStatus('Error: ' + err.message);
        btn.disabled = false;
      }
    }

    async function endCall() {
      if (callObject) {
        await callObject.leave();
        callObject.destroy();
        callObject = null;
      }
    }
  </script>
</body>
</html>
