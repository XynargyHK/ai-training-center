version: '3.8'

services:
  # THE BROWSER: High-stability Chrome engine
  browser:
    image: browserless/chrome:latest
    container_name: staff-browser
    restart: always
    ports:
      - "3001:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=10
      - CHROME_REFRESH_SECONDS=3600
      - CONNECTION_TIMEOUT=300000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # THE AGENT: The OpenClaw Execution Kernel
  openclaw:
    image: openclaw/openclaw:latest
    container_name: staff-agent-local
    restart: always
    depends_on:
      browser:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - BROWSER_WS_ENDPOINT=ws://browser:3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AGENT_NAME=HeadOfStaff_Local
      - WORKSPACE_DIR=/app/workspace
    volumes:
      - ./workspace:/app/workspace
      - ./logs:/app/logs
      - ./skills:/app/skills # This is where we will add the "Skills"
